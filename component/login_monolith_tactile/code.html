<div class="flex justify-between items-center">
<label class="font-label text-[10px] uppercase tracking-widest text-on-surface-variant font-semibold" for="password">Password</label>
<a class="font-label text-[10px] uppercase tracking-widest text-on-surface-variant hover:text-primary transition-colors" href="#">Forgot?</a>
</div>
