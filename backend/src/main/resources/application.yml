server:
  port: ${SERVER_PORT:8081}

spring:
  config:
    import: optional:file:./secrets.properties
  application:
    name: tactile-gallery-backend
  profiles:
    default: sqlserver
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope:
              - openid
              - profile
              - email
  flyway:
    placeholders:
      demoAccountsEnabled: ${APP_DEMO_ACCOUNTS_ENABLED:false}
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

management:
  endpoints:
    web:
      exposure:
        include: health,info

app:
  auth:
    cookie-name: ${APP_AUTH_COOKIE_NAME:tg_session}
    cookie-secure: ${APP_AUTH_COOKIE_SECURE:false}
    cookie-same-site: ${APP_AUTH_COOKIE_SAME_SITE:Lax}
  cors:
    allowed-origins:
      - http://localhost:5173
      - http://127.0.0.1:5173
  frontend:
    base-url: ${FRONTEND_BASE_URL:http://localhost:5173}
    oauth-callback-path: ${FRONTEND_OAUTH_CALLBACK_PATH:/auth/callback}
  mail:
    enabled: ${APP_MAIL_ENABLED:true}
    from: ${MAIL_FROM:${MAIL_USERNAME:}}
    from-name: ${APP_MAIL_FROM_NAME:Tactile Gallery}
  jwt:
    secret: ${JWT_SECRET}
    issuer: ${JWT_ISSUER:tactile-gallery-backend}
    access-token-ttl-minutes: ${JWT_ACCESS_TOKEN_TTL_MINUTES:720}
  catalog-import:
    enabled: ${CATALOG_IMPORT_ENABLED:false}
    path: ${CATALOG_IMPORT_PATH:}
    exit-after-run: ${CATALOG_IMPORT_EXIT_AFTER_RUN:false}
  uploads:
    path: ${APP_UPLOADS_PATH:./uploads}
    max-file-size-bytes: ${APP_UPLOADS_MAX_FILE_SIZE_BYTES:10485760}
